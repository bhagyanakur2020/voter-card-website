<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CSC Dashboard</title>

<style>
body {margin:0;font-family:Arial;background:linear-gradient(135deg,#1e3c72,#2a5298);color:white;}
.login-box{width:300px;background:white;color:black;padding:20px;border-radius:10px;text-align:center;position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);} 
input,select{width:90%;padding:10px;margin:8px;}
button{padding:10px 20px;background:green;color:white;border:none;cursor:pointer;margin-top:8px;}
.dashboard{display:none;} .voter-page{display:none;color:black;}
.header{background:#0d47a1;padding:15px;font-size:20px;}
.container{padding:20px;}
.card{background:white;color:black;width:200px;height:150px;border-radius:10px;display:flex;flex-direction:column;justify-content:center;align-items:center;cursor:pointer;}
.form-box{background:white;padding:20px;margin:20px auto;width:340px;border-radius:10px;text-align:center;}
canvas{display:block;margin:20px auto;border:2px solid black;}
</style>
</head>
<body>

<div class="login-box" id="loginBox">
<h2>CSC Login</h2>
<input type="text" id="username" placeholder="Username"><br>
<input type="password" id="password" placeholder="Password"><br>
<button onclick="login()">Login</button>
</div>

<div class="dashboard" id="dashboard">
<div class="header">Welcome Shivam | CSC Dashboard</div>
<div class="container">
<div class="card" onclick="openVoter()">
<h3>Voter Card</h3>
<p>Print Service</p>
</div>
</div>
</div>

<div class="voter-page" id="voterPage">
<div class="header">Voter Card (Auto Template)</div>

<div class="form-box">
<h3>Enter Details</h3>

<input type="file" id="photo" accept="image/*"><br>

<input type="text" id="name_en" placeholder="Name (English)"><br>
<input type="text" id="name_hi" placeholder="नाम (Hindi)"><br>

<select id="relation_type">
<option value="Father">Father Name</option>
<option value="Husband">Husband Name</option>
</select>

<input type="text" id="father_en" placeholder="Relation Name (English)"><br>
<input type="text" id="father_hi" placeholder="संबंध नाम (Hindi)"><br>

<input type="text" id="epic" placeholder="EPIC Number"><br>

<button onclick="generateCard()">Preview Card</button>
<button onclick="downloadCard()">Download JPG</button>
</div>

<canvas id="cardCanvas" width="600" height="900"></canvas>
</div>

<script>
let userPhoto=null;
let bgReady=false;

// TEMPLATE LOAD
let bgImage=new Image();
bgImage.onload=function(){ bgReady=true; };
bgImage.onerror=function(){ alert("❌ template.jpg load nahi ho rahi"); };
bgImage.src="template.jpg";

// Photo upload
document.getElementById("photo").addEventListener("change",function(e){
 const file=e.target.files[0];
 const reader=new FileReader();
 reader.onload=function(ev){
  userPhoto=new Image();
  userPhoto.src=ev.target.result;
 }
 if(file) reader.readAsDataURL(file);
});

function login(){
 if(username.value=="admin" && password.value=="1234"){
  loginBox.style.display="none";
  dashboard.style.display="block";
 } else alert("Wrong Login");
}

function openVoter(){
 dashboard.style.display="none";
 voterPage.style.display="block";
}

function generateCard(){
 const canvas=document.getElementById("cardCanvas");
 const ctx=canvas.getContext("2d");

 if(!bgReady || !bgImage.complete || bgImage.naturalWidth===0){
   alert("⏳ Template load nahi hui. wait karo");
   return;
 }

 ctx.clearRect(0,0,canvas.width,canvas.height);
 ctx.drawImage(bgImage,0,0,600,900);

 // POSITION SETTINGS
 let photoX=205, photoY=255, photoW=190, photoH=230;

 let nameHX=180, nameHY=720;
 let nameEX=180, nameEY=760;
 let relHX=180, relHY=820;
 let relEX=180, relEY=860;
 let labelX=60;
 let epicX=300, epicY=160;

 // ✅ FIXED FONT (single declaration)
 let fontHindi="bold 24px Arial";
 let fontEnglish="bold 26px Arial";
 let fontLabel="bold 24px Arial";
 let fontEpic="bold 28px Arial";

 if(userPhoto){
   ctx.drawImage(userPhoto,photoX,photoY,photoW,photoH);
 }

 ctx.fillStyle="black";
 let relationLabel=document.getElementById("relation_type").value;

 ctx.font=fontLabel;
 ctx.fillText("Name",labelX,nameEY);
 ctx.fillText(relationLabel,labelX,relEY);

 ctx.font=fontEnglish;
 ctx.fillText(name_en.value,nameEX,nameEY);
 ctx.fillText(father_en.value,relEX,relEY);

 ctx.font=fontHindi;
 ctx.fillText(name_hi.value,nameHX,nameHY);
 ctx.fillText(father_hi.value,relHX,relHY);

 ctx.font=fontEpic;
 ctx.fillText(epic.value,epicX,epicY);
}

function downloadCard(){
 const canvas=document.getElementById("cardCanvas");
 const link=document.createElement('a');
 link.download='voter_card.jpg';
 link.href=canvas.toDataURL("image/jpeg");
 link.click();
}
</script>

</body>
</html>
